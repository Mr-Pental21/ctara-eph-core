name: Node Bindings

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  node-open:
    name: node-open (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            experimental: false
          - os: macos-13
            label: macos-x64
            experimental: false
          - os: macos-14
            label: macos-arm64
            experimental: false
          - os: windows-latest
            label: windows-x64
            experimental: false
          - os: windows-11-arm
            label: windows-arm64
            experimental: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm lockfile deps
        shell: bash
        run: |
          cd bindings/node-open
          npm ci --ignore-scripts

      - name: Build and test node-open (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd bindings/node-open
          npm run build
          npm test

      - name: Build and test node-open (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd bindings/node-open
          $vswhere = "${env:ProgramFiles(x86)}\\Microsoft Visual Studio\\Installer\\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) {
            throw "Unable to locate a Visual Studio installation with C++ tools"
          }
          $vsDevCmd = Join-Path $vsPath "Common7\\Tools\\VsDevCmd.bat"
          if (-not (Test-Path $vsDevCmd)) {
            throw "Unable to locate VsDevCmd.bat at $vsDevCmd"
          }
          $targetArch = if ((node -p "process.arch") -eq "arm64") { "arm64" } else { "x64" }
          $hostArch = if ($env:PROCESSOR_ARCHITECTURE -eq "ARM64") { "arm64" } else { "x64" }
          cmd /c "`"$vsDevCmd`" -arch=$targetArch -host_arch=$hostArch >nul && set" | ForEach-Object {
            if ($_ -match '^(.*?)=(.*)$') {
              Set-Item -Path "Env:$($matches[1])" -Value $matches[2]
            }
          }
          $env:npm_config_devdir = "$env:LOCALAPPDATA\\node-gyp\\Cache"
          $nodeVersion = node -p "process.versions.node"
          $nodeArch = node -p "process.arch"
          npx --yes node-gyp install --target $nodeVersion --devdir "$env:npm_config_devdir"
          $env:NODE_INCLUDE_DIR = "$env:npm_config_devdir\\$nodeVersion\\include\\node"
          $env:NODE_LIB_DIR = "$env:npm_config_devdir\\$nodeVersion\\$nodeArch"
          npm run build
          npm test
