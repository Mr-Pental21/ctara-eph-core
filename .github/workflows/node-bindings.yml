name: Node Bindings

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  node-open:
    name: node-open (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm lockfile deps
        shell: bash
        run: |
          cd bindings/node-open
          npm ci --ignore-scripts

      - name: Build and test node-open (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd bindings/node-open
          npm run build
          npm test

      - name: Build and test node-open (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd bindings/node-open
          $vswhere = "${env:ProgramFiles(x86)}\\Microsoft Visual Studio\\Installer\\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) {
            throw "Unable to locate a Visual Studio installation with C++ tools"
          }
          $vsDevCmd = Join-Path $vsPath "Common7\\Tools\\VsDevCmd.bat"
          if (-not (Test-Path $vsDevCmd)) {
            throw "Unable to locate VsDevCmd.bat at $vsDevCmd"
          }
          cmd /c "`"$vsDevCmd`" -arch=x64 -host_arch=x64 >nul && set" | ForEach-Object {
            if ($_ -match '^(.*?)=(.*)$') {
              Set-Item -Path "Env:$($matches[1])" -Value $matches[2]
            }
          }
          $env:npm_config_devdir = "$env:LOCALAPPDATA\\node-gyp\\Cache"
          $nodeVersion = node -p "process.versions.node"
          $nodeArch = node -p "process.arch"
          npx --yes node-gyp install --target $nodeVersion --devdir "$env:npm_config_devdir"
          $env:NODE_INCLUDE_DIR = "$env:npm_config_devdir\\$nodeVersion\\include\\node"
          $env:NODE_LIB_DIR = "$env:npm_config_devdir\\$nodeVersion\\$nodeArch"
          npm run build
          npm test
