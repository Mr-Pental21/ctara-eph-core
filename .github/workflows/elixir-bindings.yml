name: Elixir Bindings

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  elixir-open:
    name: elixir-open (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            experimental: false
          - os: macos-13
            label: macos-x64
            experimental: false
          - os: macos-14
            label: macos-arm64
            experimental: false
          - os: windows-latest
            label: windows-x64
            experimental: false
          - os: windows-11-arm
            label: windows-arm64
            experimental: true

    defaults:
      run:
        working-directory: bindings/elixir-open

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup BEAM
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.0"
          otp-version: "28.0"

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Install Elixir deps
        run: mix deps.get

      - name: Test elixir-open
        env:
          MIX_ENV: test
        run: mix test
