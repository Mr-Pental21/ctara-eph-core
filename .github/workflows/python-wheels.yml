name: Python Wheels

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        if: runner.os != 'Linux'
        uses: dtolnay/rust-toolchain@stable

      - name: Set up QEMU (Linux aarch64)
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22
        with:
          package-dir: bindings/python-open
        env:
          CIBW_ENVIRONMENT_LINUX: >
            DHRUV_REPO_ROOT=/host${{ github.workspace }}
          CIBW_ENVIRONMENT_MACOS: >
            DHRUV_REPO_ROOT=${{ github.workspace }}
            MACOSX_DEPLOYMENT_TARGET=10.12
          CIBW_ENVIRONMENT_WINDOWS: >
            DHRUV_REPO_ROOT=${{ github.workspace }}
          CIBW_BEFORE_ALL_LINUX: >
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y &&
            ln -sf "$HOME/.cargo/bin/cargo" /usr/local/bin/cargo &&
            ln -sf "$HOME/.cargo/bin/rustc" /usr/local/bin/rustc
          CIBW_BEFORE_ALL_MACOS: >
            rustup target add x86_64-apple-darwin aarch64-apple-darwin
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS_LINUX: "x86_64 aarch64"
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          CIBW_ARCHS_WINDOWS: "AMD64"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build --sdist bindings/python-open
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: bindings/python-open/dist/*.tar.gz

  test-wheels:
    name: Test wheels (${{ matrix.os }}, py${{ matrix.python }})
    needs: build-wheels
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/download-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse
      - run: python -m pip install pytest packaging
      - name: Install matching wheel
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          import sys
          from pathlib import Path

          from packaging.tags import sys_tags
          from packaging.utils import parse_wheel_filename

          wheelhouse = Path("wheelhouse")
          wheels = sorted(wheelhouse.glob("*.whl"))
          if not wheels:
              raise SystemExit("No wheels found in wheelhouse/")

          supported = set(sys_tags())
          compatible = []
          for wheel in wheels:
              _, _, _, tags = parse_wheel_filename(wheel.name)
              if tags & supported:
                  compatible.append(wheel)

          if not compatible:
              names = "\n".join(wheel.name for wheel in wheels)
              raise SystemExit(
                  "No compatible wheels found for this runner. Available wheels:\n" + names
              )

          print("Installing compatible wheel(s):")
          for wheel in compatible:
              print(f"  - {wheel.name}")

          subprocess.run(
              [sys.executable, "-m", "pip", "install", *map(str, compatible)],
              check=True,
          )
          PY
      - run: python -c "from ctara_dhruv._ffi import lib; print('ABI version:', lib.dhruv_api_version())"
      - run: pytest bindings/python-open/tests/ -v --tb=short

  windows-arm64-smoke:
    name: Windows ARM64 Python smoke (best effort)
    runs-on: windows-11-arm
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build C ABI
        run: cargo build -p dhruv_ffi_c --release
      - name: Source install smoke
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          cd bindings/python-open
          python -m pip install .
          python -c "import ctara_dhruv; from ctara_dhruv._ffi import lib; print(lib.dhruv_api_version())"

  publish-pypi:
    name: Publish Python to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist, test-wheels]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
