name: Core CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality:
    name: Quality (fmt, clippy, tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rustfmt
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Tests
        run: cargo test --workspace --all-targets --quiet

  cross-platform-tests:
    name: Cross-Platform Tests (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            experimental: false
          - os: macos-13
            label: macos-x64
            experimental: false
          - os: macos-14
            label: macos-arm64
            experimental: false
          - os: windows-latest
            label: windows-x64
            experimental: false
          - os: windows-11-arm
            label: windows-arm64
            experimental: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Tests
        run: cargo test --workspace --all-targets --quiet

      - name: cdylib artifact check
        shell: bash
        run: ./scripts/ci/check_cdylib_artifact.sh

  abi-contract:
    name: ABI Contract Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: ABI docs stay in sync
        run: ./scripts/ci/check_abi_docs.sh

      - name: FFI integration tests
        run: cargo test -p dhruv_ffi_c --test ffi_integration --quiet

  benchmark-smoke:
    name: Benchmark Smoke (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Compile benchmark targets
        run: cargo bench --workspace --no-run
